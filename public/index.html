<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Text Processor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #4a5568; margin-bottom: 20px; }
        .formula {
            background: #f7fafc;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-family: monospace;
            font-size: 18px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .upload-box {
            border: 2px dashed #cbd5e0;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .upload-box:hover { border-color: #667eea; }
        #fileInfo { margin: 10px 0; color: #718096; }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #f7fafc;
            border-radius: 5px;
        }
        .stat { text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #4a5568; }
        .stat-label { font-size: 12px; color: #718096; }
        #output {
            background: #1a202c;
            color: white;
            padding: 15px;
            border-radius: 5px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            margin: 20px 0;
        }
        .log-item {
            padding: 8px;
            margin: 5px 0;
            border-bottom: 1px solid #2d3748;
        }
        .delay { color: #48bb78; font-weight: bold; }
        .download-btn {
            background: #48bb78;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        .download-btn.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 File Text Processor</h1>
        
        <div class="formula">
            <code>setTimeout(() => {{a({{body: "file text"}})}}, delay);</code><br>
            <small>delay = line_number × 1000ms (1s, 2s, 3s...)</small>
        </div>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept=".txt" style="display: none;">
            <span>📁 Click to upload text file (Max 80MB)</span>
        </div>
        <div id="fileInfo">No file selected</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Lines</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statProcessed">0</div>
                <div class="stat-label">Processed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statDelay">1s</div>
                <div class="stat-label">Current Delay</div>
            </div>
        </div>

        <div id="output">
            <div class="log-item">⏳ Waiting for file...</div>
        </div>

        <div id="downloadBtn" class="download-btn" onclick="downloadFile()">
            📥 Download Processed File
        </div>
    </div>

    <script>
        let currentProcessId = null;
        let statusInterval = null;
        
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileInfo').textContent = `📄 ${file.name} (${(file.size/1024).toFixed(2)} KB)`;
            
            if (statusInterval) clearInterval(statusInterval);
            document.getElementById('downloadBtn').classList.remove('active');
            
            const output = document.getElementById('output');
            output.innerHTML = '<div class="log-item">📤 Uploading...</div>';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    currentProcessId = data.processId;
                    document.getElementById('statTotal').textContent = data.totalLines;
                    document.getElementById('statProcessed').textContent = '0';
                    document.getElementById('statDelay').textContent = '1s';
                    
                    output.innerHTML += `<div class="log-item">✅ ${data.totalLines} lines found</div>`;
                    output.innerHTML += `<div class="log-item">🚀 Processing: 1s, 2s, 3s...</div>`;
                    
                    startStatusCheck(data.processId);
                }
            } catch (error) {
                output.innerHTML += `<div class="log-item">❌ Error: ${error.message}</div>`;
            }
        });

        function startStatusCheck(processId) {
            statusInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/status/${processId}`);
                    const data = await res.json();
                    
                    document.getElementById('statProcessed').textContent = data.processed;
                    
                    if (data.processed < data.total) {
                        document.getElementById('statDelay').textContent = (data.processed + 1) + 's';
                    } else {
                        document.getElementById('statDelay').textContent = 'Done!';
                    }
                    
                    if (data.results && data.results.length > 0) {
                        const last = data.results[data.results.length - 1];
                        const output = document.getElementById('output');
                        
                        // Yeh hai aapka setTimeout with file text
                        output.innerHTML += `<div class="log-item">
                            <span class="delay">⏱️ ${last.delay}s</span>
                            Line ${last.lineNumber}: ${last.content.substring(0, 100)}...
                        </div>`;
                        output.scrollTop = output.scrollHeight;
                    }
                    
                    if (data.status === 'completed') {
                        clearInterval(statusInterval);
                        document.getElementById('statDelay').textContent = 'Done!';
                        document.getElementById('output').innerHTML += 
                            '<div class="log-item">✅ All lines processed!</div>';
                        document.getElementById('downloadBtn').classList.add('active');
                    }
                    
                } catch (error) {
                    console.error('Status error:', error);
                }
            }, 1000);
        }

        async function downloadFile() {
            if (currentProcessId) {
                window.open(`/api/download/${currentProcessId}`, '_blank');
            }
        }
    </script>
</body>
</html>
